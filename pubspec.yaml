name: readwise
description: A news reader app with RevenueCat subscription integration.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # RevenueCat Flutter SDK
  purchases_flutter: ^8.0.0

  # State management (Cubit - matches your existing skill set)
  flutter_bloc: ^8.1.3

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utils
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/